<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Jävligt snabbt 5G-kaffe</title>
<style>
  :root {
    --bg:           #1a1714;
    --panel:        #211d1a;
    --panel-edge:   #0e0c0a;
    --btn-top:      #322d28;
    --btn-bot:      #1d1916;
    --btn-edge:     #443c34;
    --amber:        #ff9438;
    --amber-glow:   rgba(255, 148, 56, 0.4);
    --ok:           #5ee389;
    --err:          #ef5757;
    --text:         #ebe2d2;
    --text-dim:     #7a6f63;
    --text-darker:  #4a4239;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
  linear-gradient(rgba(26, 23, 20, 0.55), rgba(26, 23, 20, 0.85)),
  url('coffeebackground.png') center / cover no-repeat fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .device {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border-radius: 18px;
    padding: 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 -1px 0 rgba(0,0,0,0.5) inset,
      0 30px 60px rgba(0,0,0,0.5),
      0 0 0 1px var(--panel-edge);
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1px solid #2c2622;
  }
  .brand h1 {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
  }
  .pwr {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber-glow);
  }
  .settings { margin-bottom: 22px; }
  .settings summary {
    cursor: pointer;
    list-style: none;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-darker);
    padding: 6px 0;
    user-select: none;
  }
  .settings summary::-webkit-details-marker { display: none; }
  .settings summary::before {
    content: "▸ ";
    display: inline-block;
    transition: transform 0.15s;
  }
  .settings details[open] summary::before { transform: rotate(90deg); }
  .settings .fields {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 10px;
    align-items: center;
    margin-top: 10px;
    padding: 10px 12px;
    background: #15120f;
    border-radius: 6px;
    border: 1px solid #0c0a08;
  }
  .settings label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .settings input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    padding: 4px 0;
    outline: none;
    border-bottom: 1px solid #2c2622;
  }
  .settings input:focus { border-bottom-color: var(--amber); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  .key {
    position: relative;
    background: linear-gradient(180deg, var(--btn-top) 0%, var(--btn-bot) 100%);
    border: 1px solid var(--btn-edge);
    border-radius: 10px;
    padding: 28px 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
    transition: transform 0.08s, box-shadow 0.08s;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 -2px 4px rgba(0,0,0,0.4) inset,
      0 2px 0 #0a0907,
      0 3px 6px rgba(0,0,0,0.4);
  }
  .key:hover { border-color: #5a5048; }
  .key:active, .key[data-state="loading"] {
    transform: translateY(2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 -2px 4px rgba(0,0,0,0.5) inset,
      0 0 0 #0a0907,
      0 1px 3px rgba(0,0,0,0.4);
  }
  .key .led {
    position: absolute;
    top: 12px; right: 12px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1a1714;
    box-shadow: 0 1px 1px rgba(0,0,0,0.6) inset;
    transition: all 0.2s;
  }
  .key[data-state="loading"] .led {
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber-glow);
    animation: pulse 0.6s ease-in-out infinite alternate;
  }
  .key[data-state="ok"] .led {
    background: var(--ok);
    box-shadow: 0 0 8px rgba(94, 227, 137, 0.5);
  }
  .key[data-state="err"] .led {
    background: var(--err);
    box-shadow: 0 0 8px rgba(239, 87, 87, 0.5);
  }
  @keyframes pulse {
    from { opacity: 0.4; }
    to   { opacity: 1; }
  }
  .key .label {
    display: block;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    text-transform: uppercase;
  }
  .key .path {
    display: block;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px;
    color: var(--text-darker);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .term {
    background: #0e0c0a;
    border-radius: 6px;
    padding: 10px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-height: 38px;
    line-height: 1.5;
    word-break: break-all;
  }
  .term::before {
    content: "› ";
    color: var(--text-darker);
  }
  .term.ok  { color: var(--ok); }
  .term.err { color: var(--err); }
</style>
</head>
<body>
  <div class="device">
    <div class="brand">
      <h1>5G-Kaffe</h1>
      <span class="pwr"></span>
    </div>

    <div class="settings">
      <details>
        <summary>Connection</summary>
        <div class="fields">
          <label>Leshan</label>
          <input id="leshan" value="">
          <label>Endpoint</label>
          <input id="endpoint" value="rpi-gpio-client">
        </div>
      </details>
    </div>

    <div class="grid">
      <button class="key" data-iid="0">
        <span class="led"></span>
        <span class="label">On</span>
        <span class="path">/26241/0/2</span>
      </button>
      <button class="key" data-iid="3">
        <span class="led"></span>
        <span class="label">Options</span>
        <span class="path">/26241/3/2</span>
      </button>
      <button class="key" data-iid="1">
        <span class="led"></span>
        <span class="label">Big Cup</span>
        <span class="path">/26241/1/2</span>
      </button>
      <button class="key" data-iid="2">
        <span class="led"></span>
        <span class="label">Small Cup</span>
        <span class="path">/26241/2/2</span>
      </button>
    </div>

    <div class="term" id="term">Ready</div>
  </div>

<script>
const OBJECT_ID    = 26241;
const ACTIVATE_RID = 2;

const termEl     = document.getElementById('term');
const leshanEl   = document.getElementById('leshan');
const endpointEl = document.getElementById('endpoint');

['leshan','endpoint'].forEach(id => {
  const el = document.getElementById(id);
  const saved = localStorage.getItem('cfg_' + id);
  if (saved) el.value = saved;
  el.addEventListener('change', () => localStorage.setItem('cfg_' + id, el.value));
});

function term(msg, cls = '') {
  termEl.textContent = msg;
  termEl.className = 'term' + (cls ? ' ' + cls : '');
}

async function fire(btn, iid) {
  const base  = leshanEl.value.replace(/\/$/, '');
  const ep    = encodeURIComponent(endpointEl.value);
  const url   = `${base}/api/clients/${ep}/${OBJECT_ID}/${iid}/${ACTIVATE_RID}`;
  const label = btn.querySelector('.label').textContent;

  btn.dataset.state = 'loading';
  term(`POST ${OBJECT_ID}/${iid}/${ACTIVATE_RID}  …`);

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Accept': 'application/json' }
    });
    const txt = await res.text();
    if (res.ok) {
      btn.dataset.state = 'ok';
      term(`${label.toLowerCase()} → ${txt || 'ok'}`, 'ok');
    } else {
      btn.dataset.state = 'err';
      term(`${label.toLowerCase()} → http ${res.status} ${txt || res.statusText}`, 'err');
    }
  } catch (e) {
    btn.dataset.state = 'err';
    term(`${label.toLowerCase()} → ${e.message}`, 'err');
  }

  setTimeout(() => { delete btn.dataset.state; }, 1400);
}

document.querySelectorAll('.key').forEach(btn => {
  btn.addEventListener('click', () => fire(btn, btn.dataset.iid));
});
</script>
</body>
</html>
